<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>ManageMe — Personal Management System</title>
<meta name="theme-color" content="#0b1623">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ManageMe">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.svg">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs/dist/pptxgen.bundle.js"></script>
<style>

:root{--bg:#0b1623;--bg2:#12202f;--bg3:#192d42;--gold:#c9a84c;--gold2:#e8d080;--gold3:rgba(201,168,76,0.12);--cream:#ede8df;--cream2:#9a9590;--red:#c0392b;--green:#1a7a4a;--amber:#c47f00;--blue:#1a5fa0;--teal:#16a085;--purple:#7d3c98;--navy:#1a2f5e;--b1:rgba(201,168,76,0.20);--b2:rgba(255,255,255,0.08);--b3:rgba(255,255,255,0.04);--r:10px;--r2:14px;}
*{box-sizing:border-box;margin:0;padding:0;}html,body{height:100%;}
body{font-family:'Lato',sans-serif;background:var(--bg);color:var(--cream);min-height:100vh;max-width:580px;margin:0 auto;padding-bottom:88px;font-size:14px;line-height:1.5;}
h1,h2,h3{font-family:'Playfair Display',serif;font-weight:600;}
#auth-screen{position:fixed;inset:0;background:linear-gradient(160deg,#070f1a 0%,#0b1623 60%,#0f1f35 100%);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow-y:auto;}
.auth-logo-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:20px;}
.auth-tagline{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--cream2);margin-top:8px;}
.auth-powered{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:rgba(201,168,76,0.4);margin-top:4px;}
.auth-card{background:rgba(18,32,47,0.96);border:1px solid var(--b1);border-radius:var(--r2);padding:22px;width:100%;max-width:360px;}
.auth-title{font-family:'Playfair Display',serif;font-size:19px;color:var(--cream);margin-bottom:16px;text-align:center;}
.auth-field{margin-bottom:10px;}
.auth-field label{display:block;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:4px;}
.auth-link{font-size:12px;color:var(--cream2);text-align:center;margin-top:11px;cursor:pointer;}
.auth-link span{color:var(--gold);text-decoration:underline;}
.auth-err{font-size:11px;color:var(--red);text-align:center;margin-top:6px;min-height:14px;}
.powered-footer{font-size:8px;color:rgba(154,149,144,0.4);text-align:center;margin-top:14px;letter-spacing:1px;}
#hdr{background:linear-gradient(160deg,var(--bg),var(--bg2));padding:10px 14px 9px;border-bottom:1px solid var(--b1);position:sticky;top:0;z-index:60;}
.hrow{display:flex;justify-content:space-between;align-items:center;}
.hdr-left{display:flex;align-items:center;gap:10px;}
.hdr-brand{display:flex;flex-direction:column;}
.hdr-appname{font-size:17px;color:var(--cream);font-family:'Playfair Display',serif;line-height:1;}
.hdr-sub{font-size:7px;letter-spacing:2px;text-transform:uppercase;color:var(--cream2);}
.hdr-right{text-align:right;}
.hdr-month{font-size:9px;color:var(--cream2);letter-spacing:0.5px;display:block;margin-bottom:1px;}
.hwn{font-size:22px;color:var(--gold);font-family:'Playfair Display',serif;line-height:1;}
#content{padding:14px;animation:fi 0.18s ease;}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.sl{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;display:block;}
.sld{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--cream2);font-weight:700;margin-bottom:6px;display:block;}
.card{background:var(--bg2);border-radius:var(--r2);border:1px solid var(--b2);padding:14px;margin-bottom:10px;}
.card.hi{border:1px solid var(--b1);background:linear-gradient(135deg,var(--bg2),var(--bg3));}
.bl{border-left:3px solid var(--gold)!important;}.blr{border-left:3px solid var(--red)!important;}.blg{border-left:3px solid var(--green)!important;}.bla{border-left:3px solid var(--amber)!important;}.blb{border-left:3px solid var(--blue)!important;}.blt{border-left:3px solid var(--teal)!important;}.blp{border-left:3px solid var(--purple)!important;}.bld{border-left:3px solid var(--b2)!important;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:7px;margin-bottom:10px;}
.sc{background:var(--bg2);border-radius:var(--r);border:1px solid var(--b2);padding:11px 9px;text-align:center;}
.sv{font-size:22px;font-weight:600;font-family:'Playfair Display',serif;line-height:1;margin-bottom:3px;}
.sk{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--cream2);display:block;}
.ss{font-size:9px;display:block;margin-top:2px;}
.pb{background:var(--bg3);border-radius:4px;height:6px;overflow:hidden;margin-top:6px;}
.pf{height:100%;border-radius:4px;transition:width 0.5s;}
.pfg{background:linear-gradient(90deg,var(--gold),var(--gold2));}.pfr{background:var(--red);}.pfgr{background:var(--green);}.pfa{background:var(--amber);}
.pr{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
.pill{padding:5px 12px;border-radius:20px;border:1px solid var(--b2);background:transparent;color:var(--cream2);font-size:11px;cursor:pointer;font-family:'Lato',sans-serif;transition:all 0.15s;white-space:nowrap;}
.pill:hover{border-color:var(--gold);color:var(--gold);}.pill.on{background:var(--gold);color:var(--bg);border-color:var(--gold);font-weight:700;}
input,textarea,select{font-family:'Lato',sans-serif;font-size:13px;color:var(--cream);background:var(--bg3);border:1px solid var(--b2);border-radius:7px;padding:9px 11px;outline:none;transition:border-color 0.15s;width:100%;}
input:focus,textarea:focus,select:focus{border-color:var(--gold);}
textarea{resize:vertical;min-height:72px;line-height:1.6;}select option{background:var(--bg2);}
input[type="number"]{-moz-appearance:textfield;}
input[type="number"]::-webkit-outer-spin-button,input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none;}
input[type="checkbox"]{width:auto;accent-color:var(--gold);}
.btn{font-family:'Lato',sans-serif;font-size:12px;font-weight:700;padding:8px 14px;border-radius:7px;border:1px solid var(--b2);background:var(--bg3);color:var(--cream);cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.btn:hover{border-color:var(--gold);color:var(--gold);}
.bp{background:var(--gold);color:var(--bg);border-color:var(--gold);}.bp:hover{background:var(--gold2);}
.bd{color:var(--red);border-color:rgba(192,57,43,0.28);background:transparent;}.bd:hover{background:rgba(192,57,43,0.1);}
.bg{color:var(--green);border-color:rgba(26,122,74,0.28);background:transparent;}.bg:hover{background:rgba(26,122,74,0.1);}
.bt{color:var(--teal);border-color:rgba(22,160,133,0.28);background:transparent;}.bt:hover{background:rgba(22,160,133,0.1);}
.bfull{width:100%;margin-bottom:8px;}.bsm{padding:3px 9px;font-size:10px;}
.fr{display:flex;gap:7px;align-items:center;}
.gi{display:flex;gap:9px;align-items:flex-start;background:var(--bg2);border-radius:var(--r);border:1px solid var(--b2);padding:11px 12px;margin-bottom:7px;transition:border-color 0.15s;}
.gi:hover{border-color:var(--b1);}.gi.dim{opacity:0.48;}.gi.editing{border-color:var(--gold)!important;background:var(--bg3);}.gi.tx{border-color:var(--teal)!important;}
.cb{width:18px;height:18px;min-width:18px;border-radius:4px;border:2px solid var(--b2);background:transparent;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;margin-top:2px;transition:all 0.15s;cursor:pointer;flex-shrink:0;}
.cb.done{background:var(--green);border-color:var(--green);}
.gt{font-size:13px;line-height:1.45;flex:1;}.gt.done{text-decoration:line-through;color:var(--cream2);}
.gmeta{margin-top:5px;display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
.gactions{display:flex;gap:4px;flex-shrink:0;margin-top:1px;}
.badge{font-size:8px;padding:2px 7px;border-radius:10px;font-weight:700;letter-spacing:0.4px;display:inline-flex;align-items:center;}
.pb10{background:rgba(125,60,152,0.2);color:#b07fd8;border:1px solid rgba(125,60,152,0.3);}
.pb5{background:rgba(26,95,160,0.2);color:#5b9bd5;border:1px solid rgba(26,95,160,0.3);}
.pb3{background:rgba(26,122,74,0.2);color:#4ab880;border:1px solid rgba(26,122,74,0.3);}
.pb1{background:rgba(196,127,0,0.2);color:#e8a832;border:1px solid rgba(196,127,0,0.3);}
.pb6{background:rgba(192,57,43,0.2);color:#e07060;border:1px solid rgba(192,57,43,0.3);}
.areabd{font-size:8px;padding:2px 7px;border-radius:10px;font-weight:700;display:inline-flex;align-items:center;background:var(--bg3);color:var(--cream2);border:1px solid var(--b2);}
.tpanel{background:rgba(22,160,133,0.08);border:1px solid rgba(22,160,133,0.3);border-radius:var(--r);padding:11px 12px;margin-top:6px;margin-bottom:8px;}
.db{margin-bottom:9px;background:var(--bg2);border-radius:var(--r);border:1px solid var(--b2);overflow:hidden;}
.dh{display:flex;justify-content:space-between;align-items:center;padding:9px 13px;background:var(--bg3);}
.dn{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);}
.dp{font-size:10px;color:var(--cream2);}.dbody{padding:10px 13px;}
.ci{display:flex;gap:9px;align-items:flex-start;margin-bottom:7px;}
.ct{font-size:13px;line-height:1.4;flex:1;}.ct.done{text-decoration:line-through;color:var(--cream2);opacity:0.6;}
.q1c{color:var(--red);}.q2c{color:var(--green);}.q3c{color:var(--amber);}.q4c{color:var(--blue);}
.q1b{background:rgba(192,57,43,0.07);border-left:3px solid var(--red);}
.q2b{background:rgba(26,122,74,0.07);border-left:3px solid var(--green);}
.q3b{background:rgba(196,127,0,0.07);border-left:3px solid var(--amber);}
.q4b{background:rgba(26,95,160,0.07);border-left:3px solid var(--blue);}
.qi{display:flex;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid var(--b2);}.qi:last-child{border-bottom:none;}
.qit{flex:1;font-size:12px;line-height:1.4;}
.qr{background:transparent;border:none;color:var(--cream2);cursor:pointer;font-size:16px;line-height:1;padding:0 3px;opacity:0.4;}.qr:hover{opacity:1;color:var(--red);}
.rf{margin-bottom:12px;}.rf label{display:block;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:5px;}
.sr{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--b2);}.sr:last-child{border-bottom:none;}
.star{font-size:18px;cursor:pointer;color:var(--b2);}.star.lit{color:var(--gold);}
.rhi{background:var(--bg2);border-radius:var(--r);border:1px solid var(--b2);padding:12px;margin-bottom:8px;}
.rhd{font-size:10px;color:var(--gold);font-weight:700;margin-bottom:7px;}
.rml{font-size:9px;color:var(--cream2);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;}
.rmt{font-size:12px;color:var(--cream);line-height:1.5;white-space:pre-wrap;}
.fe{display:flex;gap:8px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--b2);}.fe:last-child{border-bottom:none;}
.famt{font-size:14px;font-weight:700;font-family:'Playfair Display',serif;}
.fc{font-size:10px;color:var(--cream2);}
.inc{color:var(--green);}.exp{color:var(--red);}.inv{color:var(--teal);}.sav{color:var(--blue);}.dbt{color:var(--amber);}.rec{color:var(--purple);}.lon{color:#e8a832;}
.ac{background:var(--bg3);border-radius:7px;padding:11px;margin-bottom:8px;border:1px solid var(--b2);}
.al{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--cream2);margin-bottom:4px;display:block;}
.av{font-size:20px;font-family:'Playfair Display',serif;font-weight:600;}
.cw{position:relative;height:190px;margin:8px 0;}.cw2{position:relative;height:160px;margin:8px 0;}.cw3{position:relative;height:220px;margin:8px 0;}
.apr{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.apr-label{font-size:11px;color:var(--cream2);width:80px;flex-shrink:0;text-align:right;}
.apr-bar{flex:1;background:var(--bg3);border-radius:4px;height:8px;overflow:hidden;}
.apr-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width 0.6s;}
.apr-val{font-size:10px;color:var(--cream2);width:50px;text-align:right;flex-shrink:0;}
.egrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:12px;}
.ebtn{background:var(--bg3);border:1px solid var(--b2);border-radius:var(--r);padding:11px 6px;cursor:pointer;text-align:center;transition:all 0.15s;font-family:'Lato',sans-serif;color:var(--cream);}
.ebtn:hover{border-color:var(--gold);color:var(--gold);}
.ei{font-size:22px;display:block;margin-bottom:3px;}.elbl{font-size:10px;font-weight:700;display:block;}.esub{font-size:8px;color:var(--cream2);display:block;margin-top:1px;}
.empty{font-style:italic;color:var(--cream2);font-size:12px;padding:10px 0;text-align:center;}
.div{height:1px;background:var(--b2);margin:12px 0;}
.mnav{display:flex;align-items:center;gap:8px;margin-bottom:13px;}.md{flex:1;text-align:center;font-size:14px;font-family:'Playfair Display',serif;}
.cat-row{display:flex;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--b2);}.cat-row:last-child{border-bottom:none;}
.cat-name{flex:1;font-size:13px;}.cat-actions{display:flex;gap:4px;}
.fund-card{background:var(--bg2);border-radius:var(--r);border:1px solid var(--b2);padding:12px;margin-bottom:8px;}
.fund-name{font-size:14px;font-weight:700;font-family:'Playfair Display',serif;color:var(--cream);margin-bottom:3px;}
.fund-bal{font-size:22px;font-family:'Playfair Display',serif;font-weight:600;color:var(--green);}
.debt-card{background:var(--bg2);border-radius:var(--r);border:1px solid rgba(192,57,43,0.25);padding:12px;margin-bottom:8px;}
.loan-card{background:var(--bg2);border-radius:var(--r);border:1px solid rgba(201,168,76,0.25);padding:12px;margin-bottom:8px;}
.recv-card{background:var(--bg2);border-radius:var(--r);border:1px solid rgba(125,60,152,0.25);padding:12px;margin-bottom:8px;}
.ai-resp{background:var(--bg3);border:1px solid var(--b1);border-radius:var(--r);padding:14px;margin-top:10px;font-size:13px;line-height:1.8;color:var(--cream);white-space:pre-wrap;}
.qr-box{background:white;border-radius:var(--r);padding:12px;display:flex;align-items:center;justify-content:center;margin:10px auto;}
.portal-period{display:flex;gap:5px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;}
.portal-period::-webkit-scrollbar{display:none;}.portal-period .pill{flex-shrink:0;}
.pr-row{display:flex;gap:9px;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--b2);}.pr-row:last-child{border-bottom:none;}
.pr-i{font-size:13px;color:var(--gold);font-weight:700;flex-shrink:0;min-width:20px;}.pr-t{font-size:12px;line-height:1.4;}
.filter-bar{background:var(--bg3);border-radius:var(--r);border:1px solid var(--b2);padding:10px 12px;margin-bottom:12px;}
.filter-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:8px;display:block;}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.filter-row input,.filter-row select{font-size:11px;padding:6px 8px;flex:1;min-width:80px;}
.filter-active{border:1px solid var(--gold)!important;}
.audit-row{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--b2);}
.audit-row:last-child{border-bottom:none;}
.audit-ts{font-size:9px;color:var(--cream2);min-width:70px;flex-shrink:0;line-height:1.4;}
.audit-action{font-size:10px;color:var(--gold);font-weight:700;display:block;margin-bottom:2px;}
.audit-detail{font-size:11px;color:var(--cream);line-height:1.4;}
.stmt-table{width:100%;border-collapse:collapse;margin-bottom:10px;font-size:12px;}
.stmt-table th{background:var(--bg3);color:var(--gold);padding:6px 8px;text-align:left;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;}
.stmt-table td{padding:6px 8px;border-bottom:1px solid var(--b3);color:var(--cream);vertical-align:top;}
.stmt-table tr:last-child td{border-bottom:none;}
.stmt-table .total-row td{border-top:1px solid var(--b2);font-weight:700;color:var(--cream);}
.stmt-table .subtotal td{color:var(--cream2);font-size:11px;}
.stmt-table .pos{color:var(--green);font-weight:700;}.stmt-table .neg{color:var(--red);font-weight:700;}.stmt-table .nt{text-align:right;}
.stmt-section{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:700;padding:8px 8px 4px;background:rgba(201,168,76,0.05);border-left:2px solid var(--gold);}
.health-score{display:flex;align-items:center;gap:14px;padding:12px;background:var(--bg3);border-radius:var(--r);margin-bottom:10px;}
.health-grade{font-size:44px;font-family:'Playfair Display',serif;font-weight:700;line-height:1;}
.health-info{flex:1;}
.health-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--cream2);display:block;margin-bottom:3px;}
.health-desc{font-size:13px;color:var(--cream);font-family:'Playfair Display',serif;}
.score-bar-wrap{margin-top:6px;}
.analysis-text{font-size:13px;color:var(--cream);line-height:1.8;margin-bottom:10px;padding:12px;background:var(--bg3);border-radius:var(--r);border-left:2px solid var(--gold);}
.rec-item{display:flex;gap:8px;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--b2);}
.rec-item:last-child{border-bottom:none;}
.rec-num{font-size:10px;color:var(--gold);font-weight:700;min-width:20px;}
.rec-text{font-size:12px;color:var(--cream);line-height:1.5;}
.mode-toggle{display:flex;gap:6px;margin-bottom:12px;}
.mode-btn{flex:1;padding:9px;border-radius:7px;border:1px solid var(--b2);background:var(--bg3);color:var(--cream2);cursor:pointer;font-family:'Lato',sans-serif;font-size:12px;font-weight:700;text-align:center;transition:all 0.15s;}
.mode-btn.active{background:var(--bg);border-color:var(--gold);color:var(--gold);}
.archive-badge{font-size:8px;background:rgba(154,149,144,0.15);color:var(--cream2);border:1px solid var(--b2);border-radius:10px;padding:1px 6px;margin-left:5px;}
.inactive-badge{font-size:8px;background:rgba(192,57,43,0.1);color:var(--red);border:1px solid rgba(192,57,43,0.25);border-radius:10px;padding:1px 6px;margin-left:5px;}
.subcat-list{padding:6px 0 0 12px;}
.subcat-item{display:flex;gap:6px;align-items:center;padding:4px 0;font-size:11px;color:var(--cream2);}
.subcat-dot{width:4px;height:4px;border-radius:50%;background:var(--gold);flex-shrink:0;}
.net-worth-card{background:linear-gradient(135deg,var(--bg2),var(--bg3));border:1px solid var(--b1);border-radius:var(--r2);padding:16px;margin-bottom:10px;text-align:center;}
.nw-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--cream2);display:block;margin-bottom:6px;}
.nw-value{font-size:32px;font-family:'Playfair Display',serif;font-weight:700;line-height:1;}
.streak-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(196,127,0,0.15);border:1px solid rgba(196,127,0,0.3);border-radius:20px;padding:3px 10px;font-size:10px;color:var(--amber);font-weight:700;}

function cDef(extra){var base={responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#9a9590',font:{family:'Lato',size:10}}}},scales:{x:{ticks:{color:'#9a9590',font:{size:9}},grid:{color:'rgba(255,255,255,0.04)'}},y:{ticks:{color:'#9a9590',font:{size:9}},grid:{color:'rgba(255,255,255,0.04)'}}}};return extra?Object.assign(base,extra):base;}
function render(){
  if(!CURRENT_USER){showAuth();return;}
  updateHdr();
  updateNavVisibility();
  var c=document.getElementById('content');
  // Feature gating
  var paidOnly=['finance','statements','reports'];
  if(paidOnly.indexOf(ST.tab)>=0&&!isPaid()){
    ST._requestedFeature=ST.tab.charAt(0).toUpperCase()+ST.tab.slice(1);
    c.innerHTML=rPaywall(ST._requestedFeature||ST.tab);
    return;
  }
  if(ST.tab==='admin'&&!isAdmin()){c.innerHTML='<p class="empty" style="padding:40px">Admin access required.</p>';return;}
  var fns={dashboard:rDashboard,portal:rPortal,monthly:rMonthly,weekly:rWeekly,matrix:rMatrix,review:rReview,reports:rReports,finance:rFinance,statements:rStatements,admin:rAdmin,payment:rPaymentTab};
  c.innerHTML=(fns[ST.tab]||rDashboard)();
  postRender();
}


function handleTabClick(tab){
  // Gating for paid tabs
  var paidOnlyTabs=['finance','statements','reports'];
  var adminOnlyTabs=['admin'];
  if(paidOnlyTabs.indexOf(tab)>=0&&!isPaid()){
    ST._requestedFeature=tab.charAt(0).toUpperCase()+tab.slice(1);
    switchTab('payment');return;
  }
  if(adminOnlyTabs.indexOf(tab)>=0&&!isAdmin()){
    toast('Admin access required','error');return;
  }
  switchTab(tab);
}
function updateNavVisibility(){
  // Show upgrade tab for free users, hide for paid
  var payNav=document.getElementById('nav-payment');
  var adminNav=document.getElementById('nav-admin');
  if(payNav)payNav.style.display=isPaid()?'none':'flex';
  if(adminNav)adminNav.style.display=isAdmin()?'flex':'none';
  // Show role badge in header
  var badge=document.getElementById('role-badge');
  if(badge){
    if(isFounder())badge.textContent='\u2605 Founder';
    else if(isSuperAdmin())badge.textContent='\u25ca Super Admin';
    else if(isAdmin())badge.textContent='\u25ca IE Admin';
    else if(isPaid())badge.textContent='Premium';
    else badge.textContent='Free Plan';
    badge.style.color=isPaid()?'var(--green)':'var(--cream2)';
  }
}

    {id:'f1',name:'Emergency Fund',target:5000},

// Debounced async save
var _saveTimer=null;
function saveDB(){
  // Instant local cache
  try{localStorage.setItem('mm-cache',JSON.stringify(DB));}catch(e){}
  // Async cloud sync (debounced 1.5s)
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(async function(){
    if(!CURRENT_USER||!sbReady)return;
    try{
      await sb.from('user_data').upsert({user_id:CURRENT_USER.id,data:DB,updated_at:new Date().toISOString()},{onConflict:'user_id'});
    }catch(e){console.warn('Cloud sync failed, cached locally');}
  },1500);
}

async function loadDB(){
  // Load from local cache first (instant)
  try{var c=localStorage.getItem('mm-cache');if(c)DB=JSON.parse(c);}catch(e){}
  // Then sync from cloud
  if(!CURRENT_USER||!sbReady)return;
  try{
    var r=await sb.from('user_data').select('data,updated_at').eq('user_id',CURRENT_USER.id).single();
    if(r.data&&r.data.data&&Object.keys(r.data.data).length>0){
      DB=r.data.data;
      try{localStorage.setItem('mm-cache',JSON.stringify(DB));}catch(e){}
    }
  }catch(e){}
  // Ensure required keys exist
  AREAS.forEach(function(a){if(!DB.goals[a.key])DB.goals[a.key]=[];});
  if(!DB.finance)DB.finance={entries:[],funds:[],debts:[],investments:[],loans_given:[],receivables:[],budgets:{},savingsGoal:0};
  ['funds','debts','investments','loans_given','receivables'].forEach(function(k){if(!DB.finance[k])DB.finance[k]=[];});
  if(!DB.categories){DB.categories=defaultCats();}
  else{var dc=defaultCats();Object.keys(dc).forEach(function(k){if(!DB.categories[k])DB.categories[k]=dc[k];});}
  if(!DB.settings)DB.settings={claudeApiKey:'',appUrl:'',analysisMode:'builtin'};
  if(!DB.settings.analysisMode)DB.settings.analysisMode='builtin';
}

async function loadProfile(){
  if(!CURRENT_USER||!sbReady)return;

    var r=await sb.from('profiles').select('*').eq('user_id',CURRENT_USER.id).single();
    if(r.data)PROFILE=r.data;

async function handleSignup(){

var ST={tab:'dashboard',mk:'',week:1,portalPeriod:'1y',portalArea:'All',rmode:'weekly',aq:'q1',editId:null,transferId:null,editTaskId:null,fview:'add',weekView:1,catType:'income',editCatIdx:null,adminView:'account',stmtView:'income',stmtPeriod:'month'};
var FILT={active:false,type:'all',dateFrom:'',dateTo:'',category:'all',area:'all',status:'all',fund:'all'};
function initST(){var n=new Date();ST.mk=n.getFullYear()+'-'+pd(n.getMonth()+1);ST.week=Math.min(4,Math.ceil(n.getDate()/7));ST.weekView=ST.week;}

/* ═══════════════════════════════════════
   HELPERS
═══════════════════════════════════════ */
var _uid=Date.now();
function uid(){return'i'+(++_uid);}
function pd(n){return String(n).padStart(2,'0');}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function ml(mk){var p=mk.split('-');return MONTHS[parseInt(p[1])-1]+' '+p[0];}
function td(){var d=new Date();return d.getFullYear()+'-'+pd(d.getMonth()+1)+'-'+pd(d.getDate());}
function fd(s){if(!s)return'';var p=s.split('-');return p[2]+'/'+p[1]+'/'+p[0].slice(2);}
function fa(n,cur){return(cur||'USD')+' '+parseFloat(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function plabel(k){var m={'10y':'10 Years','5y':'5 Years','3y':'3 Years','1y':'1 Year','6m':'6 Months'};return m[k]||k;}
function pcls(k){var m={'10y':'pb10','5y':'pb5','3y':'pb3','1y':'pb1','6m':'pb6'};return m[k]||'pb1';}
function getPlan(mk){if(!DB.plans[mk])DB.plans[mk]={primary:null,backup1:null,backup2:null,weeks:{1:{subgoal:'',days:[[],[],[],[],[],[],[]]},2:{subgoal:'',days:[[],[],[],[],[],[],[]]},3:{subgoal:'',days:[[],[],[],[],[],[],[]]},4:{subgoal:'',days:[[],[],[],[],[],[],[]]}}};return DB.plans[mk];}
function getMat(mk,wk){var k=mk+'-w'+wk;if(!DB.matrix[k])DB.matrix[k]={q1:[],q2:[],q3:[],q4:[]};return DB.matrix[k];}
function getWR(mk,wk){var k=mk+'-w'+wk;if(!DB.weeklyReviews[k])DB.weeklyReviews[k]={successes:'',challenges:'',lessons:'',recommendations:'',scores:{goal:0,discipline:0,focus:0}};return DB.weeklyReviews[k];}
function getMR(mk){if(!DB.monthlyReviews[mk])DB.monthlyReviews[mk]={successes:'',challenges:'',lessons:'',recommendations:'',scores:{goal:0,discipline:0,focus:0}};return DB.monthlyReviews[mk];}
function allGoals(){return Object.values(DB.goals).flat();}
function getGoalById(id){for(var k in DB.goals){var g=(DB.goals[k]||[]).find(function(x){return x.id===id;});if(g)return{goal:g,area:k};}return null;}
function getStats(){
  var plan=getPlan(ST.mk),mat=getMat(ST.mk,ST.week),ag=allGoals();
  var allT=[1,2,3,4].flatMap(function(w){return((plan.weeks[w]||{}).days||[]).flat();});
  var dT=allT.filter(function(t){return t.checked;}).length;
  var streak=calcStreak();
  return{tG:ag.length,dG:ag.filter(function(g){return g.completed;}).length,tT:allT.length,dT:dT,pct:allT.length?Math.round(dT/allT.length*100):0,q1:(mat.q1||[]).length,streak:streak};
}
function calcStreak(){var plan=getPlan(ST.mk);var streak=0;var today=new Date();for(var i=0;i<30;i++){var d=new Date(today);d.setDate(d.getDate()-i);var di=d.getDay()===0?6:d.getDay()-1;var wk=Math.min(4,Math.ceil(d.getDate()/7));var tasks=((plan.weeks[wk]||{}).days||[])[di]||[];if(tasks.length>0&&tasks.every(function(t){return t.checked;})){streak++;}else if(tasks.length>0){break;}}return streak;}
function getCats(t){var cats=DB.categories&&DB.categories[t]?DB.categories[t]:defaultCats()[t]||[];return cats.filter(function(c){return!c.archived;});}
function getCatNames(t){return getCats(t).filter(function(c){return c.active;}).map(function(c){return typeof c==='object'?c.name:c;});}
function getCatOpts(t){return getCatNames(t).map(function(n){return'<option value="'+esc(n)+'">'+esc(n)+'</option>';}).join('');}
function getFundBalance(id){return(DB.finance.entries||[]).reduce(function(a,e){if((e.type==='savings_in'&&e.fundId===id)||(e.type==='transfer'&&e.accountTo===id))return a+parseFloat(e.amount||0);if((e.type==='savings_out'&&e.fundId===id)||(e.type==='transfer'&&e.accountFrom===id))return a-parseFloat(e.amount||0);return a;},0);}
function getDebtBalance(id){var debt=(DB.finance.debts||[]).find(function(d){return d.id===id;});if(!debt)return 0;var paid=(DB.finance.entries||[]).filter(function(e){return e.debtId===id&&e.type==='debt_payment';}).reduce(function(a,e){return a+parseFloat(e.amount||0);},0);return Math.max(0,parseFloat(debt.principal||0)-paid);}
function getLoanBalance(id){var loan=(DB.finance.loans_given||[]).find(function(l){return l.id===id;});if(!loan)return 0;var repaid=(DB.finance.entries||[]).filter(function(e){return e.loanId===id&&e.type==='loan_repayment_received';}).reduce(function(a,e){return a+parseFloat(e.amount||0);},0);return Math.max(0,parseFloat(loan.amount||0)-repaid);}
function getReceivableBalance(id){var recv=(DB.finance.receivables||[]).find(function(r){return r.id===id;});if(!recv)return 0;var received=(DB.finance.entries||[]).filter(function(e){return e.receivableId===id&&e.type==='receivable_received';}).reduce(function(a,e){return a+parseFloat(e.amount||0);},0);return Math.max(0,parseFloat(recv.amount||0)-received);}
function getDateRange(period){var now=new Date();var y=now.getFullYear();var ranges={today:{from:td(),to:td()},week:(function(){var s=new Date(now);s.setDate(s.getDate()-6);return{from:s.getFullYear()+'-'+pd(s.getMonth()+1)+'-'+pd(s.getDate()),to:td()};})(),month:{from:ST.mk+'-01',to:ST.mk+'-31'},quarter:{from:y+'-'+pd(Math.floor(now.getMonth()/3)*3+1)+'-01',to:td()},year:{from:y+'-01-01',to:td()},custom:{from:FILT.dateFrom||ST.mk+'-01',to:FILT.dateTo||td()}};return ranges[period]||ranges.month;}
function finEntries(period){var all=DB.finance.entries||[];var r=getDateRange(period);if(r.from)all=all.filter(function(e){return e.date>=r.from&&e.date<=r.to;});if(FILT.active){if(FILT.type!=='all')all=all.filter(function(e){return e.type===FILT.type;});if(FILT.category!=='all')all=all.filter(function(e){return e.category===FILT.category;});}return all;}

  var catOpts='<option value="all">All Categories</option>'+getCatNames('income').concat(getCatNames('expense')).map(function(n){return'<option value="'+esc(n)+'"'+(FILT.category===n?' selected':'')+'>'+esc(n)+'</option>';}).join('');
  var activeClass=FILT.active?' filter-active':'';
  return'<div class="filter-bar'+(FILT.active?' filter-active':'')+'">' +
    '<span class="filter-label">'+(FILT.active?'\u25cf Active Filter':'Filters')+'</span>'+
    '<div class="filter-row">'+
      (context==='finance'?'<select id="filt-type" onchange="setFilt(\'type\',this.value)" style="flex:1.5">'+typeOpts+'</select>':'')+ 
      '<input type="date" id="filt-from" value="'+FILT.dateFrom+'" onchange="setFilt(\'dateFrom\',this.value)" placeholder="From">'+
      '<input type="date" id="filt-to" value="'+FILT.dateTo+'" onchange="setFilt(\'dateTo\',this.value)" placeholder="To">'+
      '<select id="filt-cat" onchange="setFilt(\'category\',this.value)">'+catOpts+'</select>'+
      '<button class="btn bp bsm" onclick="applyFilter()">Apply</button>'+
      '<button class="btn bd bsm" onclick="resetFilter()">Reset</button>'+
    '</div></div>';
}
function setFilt(k,v){FILT[k]=v;}
function applyFilter(){
  FILT.active=true;
  if(FILT.dateFrom||FILT.dateTo||FILT.type!=='all'||FILT.category!=='all'){
    logAudit('FILTER','Filter applied: type='+FILT.type+', from='+FILT.dateFrom+', to='+FILT.dateTo);
  }
  render();
}
function resetFilter(){FILT={active:false,type:'all',dateFrom:'',dateTo:'',category:'all',area:'all',status:'all',fund:'all'};render();toast('Filters reset');}

function renderGoalItem(g,showTx){
  var aObj=AREAS.find(function(a){return a.key===g.area;})||{short:'?',cls:'bld'};
  var pObj=PERIODS.find(function(p){return p.key===g.period;})||null;
  var isEdit=ST.editId===g.id,isTx=ST.transferId===g.id;
  if(isEdit){
    var aOpts=AREAS.map(function(a){return'<option value="'+a.key+'"'+(g.area===a.key?' selected':'')+'>'+a.label+'</option>';}).join('');
    var pOpts=PERIODS.map(function(p){return'<option value="'+p.key+'"'+(g.period===p.key?' selected':'')+'>'+p.label+'</option>';}).join('');
    var mOpts='<option value="">No month</option>'+MONTHS.map(function(m,i){return'<option value="'+(i+1)+'"'+(g.month==(i+1)?' selected':'')+'>'+m+'</option>';}).join('');
    return'<div class="gi editing"><div style="flex:1"><span class="sld" style="margin-bottom:5px">Editing goal</span><input type="text" id="ei-t" value="'+esc(g.text)+'" style="margin-bottom:6px"><div class="g3" style="margin-bottom:6px"><select id="ei-a">'+aOpts+'</select><select id="ei-p">'+pOpts+'</select><select id="ei-m">'+mOpts+'</select></div><div class="fr"><button class="btn bp bsm" onclick="saveEdit(\''+g.id+'\')">Save</button><button class="btn bsm" onclick="cancelEdit()">Cancel</button></div></div></div>';
  }
  var txPanel='';
  if(isTx){var tpOpts=PERIODS.map(function(p){return'<option value="'+p.key+'"'+(g.period===p.key?' selected':'')+'>'+p.label+'</option>';}).join('');var taOpts=AREAS.map(function(a){return'<option value="'+a.key+'"'+(g.area===a.key?' selected':'')+'>'+a.label+'</option>';}).join('');txPanel='<div class="tpanel"><span class="sl" style="color:var(--teal);margin-bottom:6px">\u21c4 Transfer Goal</span><div class="g2" style="margin-bottom:8px"><select id="tp-p">'+tpOpts+'</select><select id="tp-a">'+taOpts+'</select></div><div class="fr"><button class="btn bt bsm" onclick="doTransfer(\''+g.id+'\')">Confirm</button><button class="btn bsm" onclick="cancelTransfer()">Cancel</button></div></div>';}
  return'<div><div class="gi'+(g.completed?' dim':'')+(isTx?' tx':'')+' '+aObj.cls+'"><div class="cb'+(g.completed?' done':'')+'" onclick="toggleG(\''+g.id+'\')">'+( g.completed?'&#10003;':'')+'</div><div style="flex:1"><p class="gt'+(g.completed?' done':'')+'">'+esc(g.text)+'</p><div class="gmeta">'+(pObj?'<span class="badge '+pObj.cls+'">'+pObj.label+'</span>':'')+' <span class="areabd">'+aObj.short+'</span>'+(g.month?'<span class="areabd" style="color:var(--gold)">'+MONTHS[g.month-1]+'</span>':'')+'</div></div><div class="gactions"><button class="btn bsm" onclick="startEdit(\''+g.id+'\')">\u270e</button>'+(showTx?'<button class="btn bt bsm" onclick="startTransfer(\''+g.id+'\')">\u21c4</button>':'')+' <button class="btn bd bsm" onclick="delGoal(\''+g.id+'\')">&#215;</button></div></div>'+txPanel+'</div>';
}
function rPortal(){
  var pp=ST.portalPeriod,pa=ST.portalArea;
  var pObj=PERIODS.find(function(p){return p.key===pp;})||PERIODS[3];
  var fArea=FILT.active&&FILT.area!=='all'?FILT.area:pa;
  var fStatus=FILT.active&&FILT.status!=='all'?FILT.status:'all';
  var gs=allGoals().filter(function(g){
    if(g.period!==pp)return false;
    if(fArea!=='All'&&g.area!==fArea)return false;
    if(fStatus==='active'&&g.completed)return false;
    if(fStatus==='done'&&!g.completed)return false;
    return true;
  });
  var ppills=PERIODS.map(function(p){var cnt=allGoals().filter(function(g){return g.period===p.key;}).length;return'<button class="pill'+(pp===p.key?' on':'')+'" onclick="setPortalP(\''+p.key+'\')">'+p.label+' ('+cnt+')</button>';}).join('');
  var apills='<button class="pill'+(pa==='All'?' on':'')+'" onclick="setPortalA(\'All\')">All</button>'+AREAS.map(function(a){var cnt=allGoals().filter(function(g){return g.period===pp&&g.area===a.key;}).length;return'<button class="pill'+(pa===a.key?' on':'')+'" onclick="setPortalA(\''+a.key+'\')">'+a.short+' ('+cnt+')</button>';}).join('');
  var areaOpts=AREAS.map(function(a){return'<option value="'+a.key+'"'+(pa!=='All'&&pa===a.key?' selected':'')+'>'+a.label+'</option>';}).join('');
  var goalFilter='<div class="filter-bar"><span class="filter-label">Goal Filters</span><div class="filter-row">'+
    '<select onchange="setFilt(\'area\',this.value);applyFilter()"><option value="all">All Areas</option>'+AREAS.map(function(a){return'<option value="'+a.key+'"'+(FILT.area===a.key?' selected':'')+'>'+a.label+'</option>';}).join('')+'</select>'+
    '<select onchange="setFilt(\'status\',this.value);applyFilter()"><option value="all">All Status</option><option value="active">Active</option><option value="done">Completed</option></select>'+
    '<button class="btn bd bsm" onclick="resetFilter()">Reset</button>'+
  '</div></div>';
  return'<span class="sl">Goals Portal \u2014 Master Register</span><div class="portal-period">'+ppills+'</div>'+
  '<div class="card bl" style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><p style="font-family:Playfair Display,serif;font-size:17px;margin-bottom:2px">'+pObj.label+' Goals</p><p style="font-size:11px;color:var(--cream2)">'+pObj.desc+'</p></div><span class="badge '+pObj.cls+'">'+pObj.label+'</span></div></div>'+
  '<div class="pr">'+apills+'</div>'+goalFilter+
  '<div class="card" style="margin-bottom:12px"><span class="sl" style="margin-bottom:8px">Add Goal</span>'+
    '<input type="text" id="pinp" placeholder="Describe this goal clearly and specifically..." style="margin-bottom:7px" onkeydown="if(event.key===\'Enter\')addPortalGoal()">'+
    '<div class="g2" style="margin-bottom:7px"><select id="parea"><option value="">Select life area *</option>'+areaOpts+'</select><select id="pmonth"><option value="">Month (optional)</option>'+MONTHS.map(function(m,i){return'<option value="'+(i+1)+'">'+m+'</option>';}).join('')+'</select></div>'+
    '<button class="btn bp bfull" onclick="addPortalGoal()">Add to '+pObj.label+' Goals</button></div>'+
  (gs.length===0?'<p class="empty">No goals for this period/filter. Add one above.</p>':gs.map(function(g){return renderGoalItem(g,true);}).join(''))+
  '<div style="height:8px"></div>';
}

function rMonthly(){
  var plan=getPlan(ST.mk);
  var allG=allGoals().filter(function(g){return!g.completed;});
  var grp=AREAS.map(function(a){return{area:a,gs:allG.filter(function(g){return g.area===a.key;})};}).filter(function(x){return x.gs.length>0;});
  var slots=['primary','backup1','backup2'].map(function(slot,i){
    var sp=plan[slot];var isP=i===0;
    var inner=sp?'<p style="font-family:Playfair Display,serif;font-size:14px;line-height:1.5;margin-bottom:6px">'+esc(sp.text)+'</p><div class="gmeta" style="margin-bottom:7px">'+(sp.period?'<span class="badge '+pcls(sp.period)+'">'+plabel(sp.period)+'</span>':'')+' <span class="areabd">'+(AREAS.find(function(a){return a.key===sp.area;})||{short:''}).short+'</span></div><button class="btn bd bsm" onclick="clrSlot(\''+slot+'\')">Remove</button>':
      '<p class="empty" style="text-align:left;padding:0 0 7px;font-size:11px">Select from your goal portal:</p><select onchange="asgnSlot(\''+slot+'\',this.value);this.value=\'\'"><option value="">\u2014 Choose a goal \u2014</option>'+grp.map(function(x){return'<optgroup label="'+x.area.label+'">'+x.gs.map(function(g){var pd=g.period?'['+plabel(g.period)+'] ':'';return'<option value="'+x.area.key+'::'+g.id+'::'+( g.period||'')+'">'+pd+esc(g.text.substring(0,55))+'</option>';}).join('')+'</optgroup>';}).join('')+'</select>';
    return'<div class="card '+(isP?'bl':'bld')+'"><span class="'+(isP?'sl':'sld')+'" style="margin-bottom:6px">'+(isP?'\u2605 Primary Goal':'\u25c7 Backup '+i)+'</span>'+inner+'</div>';
  }).join('');
  var wks=[1,2,3,4].map(function(wk){var wd=(plan.weeks||{})[wk]||{subgoal:'',days:[]};var isCur=wk===ST.week;var wkT=((wd.days||[])).flat();var wkD=wkT.filter(function(t){return t.checked;}).length;var wp=wkT.length?Math.round(wkD/wkT.length*100):0;return'<div class="card '+(isCur?'bl':'bld')+'" style="margin-bottom:8px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px"><span class="'+(isCur?'sl':'sld')+'" style="margin:0">Week '+wk+(isCur?' \u25b6':' ')+'</span>'+(wkT.length?'<span style="font-size:10px;color:var(--cream2)">'+wp+'%</span>':'')+'</div><input type="text" value="'+esc(wd.subgoal||'')+'" placeholder="Week sub-goal..." onchange="saveSG('+wk+',this.value)" onblur="saveSG('+wk+',this.value)">'+(wkT.length?'<div class="pb" style="margin-top:6px"><div class="pf pfg" style="width:'+wp+'%"></div></div>':'')+'</div>';}).join('');
  return'<span class="sl">Monthly Planner</span><div class="mnav"><button class="btn" onclick="navM(-1)">\u2039 Prev</button><span class="md">'+ml(ST.mk)+'</span><button class="btn" onclick="navM(1)">Next \u203a</button></div>'+slots+'<div class="div"></div><span class="sl">Weekly Sub-Goals</span>'+wks+'<div style="height:8px"></div>';
}
function rWeekly(){
  var plan=getPlan(ST.mk);var wv=ST.weekView;var wd=(plan.weeks||{})[wv]||{subgoal:'',days:[[],[],[],[],[],[],[]]};
  var wkp=[1,2,3,4].map(function(w){return'<button class="pill'+(wv===w?' on':'')+'" onclick="setWV('+w+')">Week '+w+'</button>';}).join('');
  var banner=wd.subgoal?'<div class="card bl" style="margin-bottom:11px"><span class="sl" style="margin-bottom:4px">Week '+wv+' Sub-Goal</span><p style="font-family:Playfair Display,serif;font-size:14px;line-height:1.5">'+esc(wd.subgoal)+'</p></div>':'<div class="card" style="margin-bottom:11px"><p class="empty" style="padding:0">No sub-goal for Week '+wv+'. Set it in Monthly tab.</p></div>';
  var days=DSHORT.map(function(day,di){var tasks=((wd.days||[])[di])||[];var done=tasks.filter(function(t){return t.checked;}).length;var tH=tasks.map(function(task){if(ST.editTaskId===wv+'-'+di+'-'+task.id){return'<div style="display:flex;gap:6px;align-items:center;margin-bottom:7px;padding:6px;background:var(--gold3);border-radius:6px"><input type="text" id="tek" value="'+esc(task.text)+'" style="flex:1;padding:5px 8px;font-size:12px" onkeydown="if(event.key===\'Enter\')saveTaskEdit('+wv+','+di+',\''+task.id+'\')"><button class="btn bp bsm" onclick="saveTaskEdit('+wv+','+di+',\''+task.id+'\')">Save</button><button class="btn bsm" onclick="cancelTaskEdit()">&#215;</button></div>';}return'<div class="ci"><div class="cb'+(task.checked?' done':'')+'" onclick="togTask('+wv+','+di+',\''+task.id+'\')">'+( task.checked?'&#10003;':'')+'</div><span class="ct'+(task.checked?' done':'')+'" style="flex:1">'+esc(task.text)+'</span><div style="display:flex;gap:4px"><button class="btn bsm" onclick="editTask('+wv+','+di+',\''+task.id+'\')">\u270e</button><button class="btn bt bsm" onclick="moveTaskUI('+wv+','+di+',\''+task.id+'\')">\u21c4</button><button class="btn bd bsm" onclick="delTask('+wv+','+di+',\''+task.id+'\')">&#215;</button></div></div>';}).join('');return'<div class="db"><div class="dh"><span class="dn">'+day+'</span><span class="dp">'+done+'/'+tasks.length+'</span></div><div class="dbody">'+tH+'<div class="fr" style="margin-top:6px"><input type="text" id="ti'+di+'" placeholder="Add activity..." onkeydown="if(event.key===\'Enter\')addTask('+wv+','+di+')"><button class="btn" onclick="addTask('+wv+','+di+')">+</button></div></div></div>';}).join('');
  return'<span class="sl">Weekly Tracker</span><div class="pr">'+wkp+'</div>'+banner+days+'<div style="height:8px"></div>';
}
function rMatrix(){

function buildStmtAnalysis(type,data){
  var lines=[];
  if(type==='income'){
    var sr=data.totalInc>0?Math.round((data.net/data.totalInc)*100):0;
    lines.push(data.net>=0
      ?'For '+ml(ST.mk)+', total income of USD '+data.totalInc.toFixed(2)+' exceeded total expenditure of USD '+data.totalExp.toFixed(2)+', yielding a net surplus of USD '+data.net.toFixed(2)+' and a personal savings rate of '+sr+'%.'
      :'For '+ml(ST.mk)+', expenditure of USD '+data.totalExp.toFixed(2)+' exceeded income of USD '+data.totalInc.toFixed(2)+', resulting in a net deficit of USD '+Math.abs(data.net).toFixed(2)+'. Immediate review of spending categories is recommended.');
    if(Object.keys(data.expByCat).length>0){var top=Object.entries(data.expByCat).sort(function(a,b){return b[1]-a[1];})[0];lines.push('Largest expense category: '+top[0]+' at USD '+top[1].toFixed(2)+' ('+(data.totalExp>0?Math.round(top[1]/data.totalExp*100):0)+'% of total expenditure).');}
    lines.push(sr>=20?'Your savings rate of '+sr+'% exceeds the recommended 20% threshold — strong financial discipline.':'A savings rate of '+sr+'% is below the recommended 20% minimum. Review discretionary spending to improve this ratio.');
  }
  if(type==='cashflow'){
    lines.push('Net cash flow for the period is USD '+(data.netCF>=0?'+':'')+data.netCF.toFixed(2)+'. '+(data.netCF>=0?'Positive net cash flow indicates cash reserves are building.':'Negative net cash flow requires attention to cash generation and spending control.'));
    lines.push('Operating cash flow: USD '+data.netOp.toFixed(2)+'. '+(data.netOp>=0?'Core income-generating activities are cash-positive.':'Operating activities are consuming more cash than they generate — review income sources and operating expenses.'));
    if(data.netInv!==0)lines.push('Investing activities '+(data.netInv>=0?'generated':'used')+' USD '+Math.abs(data.netInv).toFixed(2)+'. '+(data.invOut>0?'USD '+data.invOut.toFixed(2)+' committed to investments this period.':''));
    lines.push('Closing savings fund balance: USD '+data.closeBal.toFixed(2)+'.');
  }
  if(type==='balance'){
    lines.push('As at '+td()+', total assets of USD '+data.totalAssets.toFixed(2)+' against liabilities of USD '+data.totalDebt.toFixed(2)+' produces a net worth of USD '+data.netWorth.toFixed(2)+'.');
    lines.push(data.netWorth>=0?'Positive net worth indicates overall financial health. Continue building assets while reducing liabilities.':'Negative net worth requires a structured plan to increase assets (savings, investments, debt collection) and reduce liabilities (debt repayment).');
    if(data.totalLoans+data.totalRecv>0)lines.push('USD '+(data.totalLoans+data.totalRecv).toFixed(2)+' in loans and receivables outstanding. Collection of these would improve your liquidity position.');
  }
  return lines.join(' ');
}

function rFinance(){
  var fv=ST.fview;
  var tabs=['add','today','month','funds','debts','loans','receivables','investments','analytics','categories'];
  var tabLabels={add:'Add Entry',today:'Today',month:'This Month',funds:'Savings',debts:'Debts',loans:'Loans Given',receivables:'Receivables',investments:'Investments',analytics:'Analytics',categories:'Categories'};
  var vp='<div class="pr" style="overflow-x:auto;flex-wrap:nowrap;padding-bottom:2px;margin-bottom:12px">'+tabs.map(function(v){return'<button class="pill'+(fv===v?' on':'')+' " style="flex-shrink:0" onclick="setFV(\''+v+'\')">'+tabLabels[v]+'</button>';}).join('')+'</div>';
  var h='<span class="sl">Financial Module</span>'+vp;
  if(fv==='add'){h+=rFinAdd();}
  else if(fv==='today'){h+=rFinPeriod('today','Today\'s Transactions');}
  else if(fv==='month'){h+=rFinMonth();}
  else if(fv==='funds'){h+=rFunds();}
  else if(fv==='debts'){h+=rDebts();}
  else if(fv==='loans'){h+=rLoans();}
  else if(fv==='receivables'){h+=rReceivables();}
  else if(fv==='investments'){h+=rInvestments();}

  return h+'<div style="height:8px"></div>';
}

async function approvePayment(paymentId,userId,months){
  months=months||1;
  var expires=new Date();expires.setMonth(expires.getMonth()+months);
  await sb.from('payment_submissions').update({status:'approved',approved_at:new Date().toISOString(),approved_by:CURRENT_USER.id}).eq('id',paymentId);
  await sb.from('profiles').update({subscription_status:'paid',role:'paid',subscription_expires:expires.toISOString()}).eq('user_id',userId);
  logAudit('ADMIN','Payment approved, user upgraded to paid: '+userId);
  toast('Payment approved \u2014 user upgraded \u2713');
  loadAdminPayments();
}
async function rejectPayment(paymentId){
  var reason=prompt('Reason for rejection (optional):');
  await sb.from('payment_submissions').update({status:'rejected',approved_at:new Date().toISOString(),approved_by:CURRENT_USER.id,rejection_reason:reason||''}).eq('id',paymentId);
  logAudit('ADMIN','Payment rejected: '+paymentId);
  toast('Payment rejected');
  loadAdminPayments();
}
async function loadAdminAuditLog(){
  var panel=document.getElementById('audit-panel');if(!panel)return;
  try{
    var r=await sb.from('audit_logs').select('*, profiles(full_name)').order('created_at',{ascending:false}).limit(100);
    if(r.error){panel.innerHTML='<span class="sl">Audit Log</span><p style="color:var(--red);font-size:12px">'+esc(r.error.message)+'</p>';return;}
    var logs=r.data||[];
    panel.innerHTML='<span class="sl" style="margin-bottom:8px">Audit Log (last 100)</span>'+
      logs.map(function(l){
        var name=l.profiles?esc(l.profiles.full_name):'System';
        var d=new Date(l.created_at);var dt=pd(d.getDate())+'/'+pd(d.getMonth()+1)+' '+pd(d.getHours())+':'+pd(d.getMinutes());
        return'<div class="audit-row"><div class="audit-ts">'+dt+'</div><div style="flex:1"><span class="audit-action">'+esc(l.action)+'</span><span style="font-size:9px;color:var(--cream2);margin-left:6px">'+name+'</span><div class="audit-detail">'+esc(l.detail||'')+'</div></div></div>';
      }).join('');
  }catch(e){if(panel)panel.innerHTML='<span class="sl">Audit Log</span><p style="color:var(--red);font-size:12px">Failed to load.</p>';}
}
async function sendPasswordReset(){
  if(!CURRENT_USER)return;
  var r=await sb.auth.resetPasswordForEmail(CURRENT_USER.email);
  if(r.error){toast('Error: '+r.error.message,'error');}
  else{toast('Password reset email sent \u2713');}
}
async function createAdminUser(){
  var email=document.getElementById('new-admin-email');var name=document.getElementById('new-admin-name');var role=document.getElementById('new-admin-role');
  if(!email||!email.value.trim()){toast('Enter email','error');return;}

  if(role&&role.value){await sb.from('profiles').update({role:role.value,subscription_status:'paid'}).eq('email',email.value.trim());}

  toast('Admin invitation sent \u2713');
}

function updateFinForm(){var tp=document.getElementById('ft');if(!tp)return;var type=tp.value;var catRow=document.getElementById('fin-cat-row'),srcRow=document.getElementById('fin-source-row'),fundRow=document.getElementById('fin-fund-row'),fund2Row=document.getElementById('fin-fund2-row'),debtRow=document.getElementById('fin-debt-row'),loanRow=document.getElementById('fin-loan-row'),recvRow=document.getElementById('fin-recv-row'),invRow=document.getElementById('fin-inv-row');[catRow,srcRow,fundRow,fund2Row,debtRow,loanRow,recvRow,invRow].forEach(function(r){if(r)r.style.display='none';});var catSel=document.getElementById('fcat');if(type==='income'){if(catSel)catSel.innerHTML='<option value="">Category</option><optgroup label="\u2191 Income">'+getCatOpts('income')+'</optgroup>';if(catRow)catRow.style.display='block';if(srcRow)srcRow.style.display='block';}else if(type==='expense'){if(catSel)catSel.innerHTML='<option value="">Category</option><optgroup label="\u2193 Expense">'+getCatOpts('expense')+'</optgroup>';if(catRow)catRow.style.display='block';}else if(type==='invest_out'||type==='invest_return'){if(invRow)invRow.style.display='block';}else if(type==='debt_payment'||type==='debt_received'){if(debtRow)debtRow.style.display='block';}else if(type==='savings_in'||type==='savings_out'){if(fundRow)fundRow.style.display='block';}else if(type==='transfer'){if(fundRow)fundRow.style.display='block';if(fund2Row)fund2Row.style.display='block';}else if(type==='loan_repayment_received'){if(loanRow)loanRow.style.display='block';}else if(type==='receivable_raised'||type==='receivable_received'){if(recvRow)recvRow.style.display='block';}}
function recentEnts(n,period){var ents=period==='all'?DB.finance.entries||[]:finEntries(period);ents=ents.slice().sort(function(a,b){return b.date.localeCompare(a.date);});if(n>0)ents=ents.slice(0,n);if(!ents.length)return'<p class="empty">No entries yet.</p>';var typeMap={income:{sign:'+',cls:'inc'},expense:{sign:'-',cls:'exp'},invest_out:{sign:'-',cls:'inv'},invest_return:{sign:'+',cls:'inc'},debt_payment:{sign:'-',cls:'dbt'},debt_received:{sign:'+',cls:'exp'},savings_in:{sign:'-',cls:'sav'},savings_out:{sign:'+',cls:'sav'},loan_given:{sign:'-',cls:'lon'},loan_repayment_received:{sign:'+',cls:'inc'},receivable_raised:{sign:'',cls:'rec'},receivable_received:{sign:'+',cls:'inc'},transfer:{sign:'\u21c4',cls:''}};return ents.map(function(e){var tm=typeMap[e.type]||{sign:'',cls:''};return'<div class="fe"><div style="flex:1"><p class="famt '+(tm.cls)+'">'+tm.sign+(tm.sign?' ':'')+fa(e.amount,e.currency)+'</p><p class="fc">'+esc(e.category||e.type||'')+(e.source?' \u00b7 '+esc(e.source):'')+(e.notes?' \u00b7 '+esc(e.notes):'')+'</p></div><div style="text-align:right;flex-shrink:0"><p style="font-size:10px;color:var(--cream2)">'+fd(e.date)+'</p><button class="btn bd bsm" style="margin-top:3px" onclick="delFin(\''+e.id+'\')">&#215;</button></div></div>';}).join('');}
function addFin(){var tp=document.getElementById('ft'),dt=document.getElementById('fd2'),am=document.getElementById('fa2'),cu=document.getElementById('fcur'),ca=document.getElementById('fcat'),nt=document.getElementById('fnt'),src=document.getElementById('fsrc'),ff=document.getElementById('ffund'),ff2=document.getElementById('ffund2'),fdb=document.getElementById('fdebt'),fl=document.getElementById('floan'),fr2=document.getElementById('frecv'),fi=document.getElementById('finv');var type=tp?tp.value:'expense';if(!am||!parseFloat(am.value)){toast('Enter a valid amount','error');return;}var entry={id:uid(),type:type,date:dt?dt.value||td():td(),amount:parseFloat(am.value),currency:cu?cu.value:'USD',notes:nt?nt.value.trim():''};if(type==='income'){if(!ca||!ca.value){toast('Select a category','error');return;}entry.category=ca.value;if(src&&src.value.trim())entry.source=src.value.trim();}else if(type==='expense'){if(!ca||!ca.value){toast('Select a category','error');return;}entry.category=ca.value;}else if(type==='savings_in'||type==='savings_out'){if(!ff||!ff.value){toast('Select a fund','error');return;}entry.fundId=ff.value;}else if(type==='transfer'){if(!ff||!ff.value||!ff2||!ff2.value){toast('Select both funds','error');return;}if(ff.value===ff2.value){toast('Select different funds','error');return;}entry.accountFrom=ff.value;entry.accountTo=ff2.value;entry.fundId=ff.value;}else if(type==='debt_payment'||type==='debt_received'){if(!fdb||!fdb.value){toast('Select a debt','error');return;}entry.debtId=fdb.value;}else if(type==='invest_out'||type==='invest_return'){if(fi&&fi.value)entry.investmentId=fi.value;}else if(type==='loan_repayment_received'){if(!fl||!fl.value){toast('Select a loan','error');return;}entry.loanId=fl.value;}else if(type==='receivable_raised'||type==='receivable_received'){if(fr2&&fr2.value)entry.receivableId=fr2.value;}logAudit('FINANCE',type+': USD '+entry.amount+' on '+entry.date);DB.finance.entries.push(entry);saveDB();toast('Transaction saved \u2713');if(am)am.value='';if(nt)nt.value='';render();}

async function runAI(focus){

  var focusVal=focus||'overall';

  var summary='USER: '+(PROFILE&&PROFILE.full_name||'')+'\nDATE: '+td()+'\nGoals: '+s.dG+'/'+s.tG+' ('+s.pct+'% tasks)\nQ1: '+s.q1+'\nStreak: '+s.streak+' days\nIncome: USD '+fs.inc.toFixed(2)+'\nExpenses: USD '+fs.exp.toFixed(2)+'\nSavings Rate: '+fs.sr+'%\nNet Worth: USD '+bs.netWorth.toFixed(2)+'\nTop expenses:\n'+Object.entries(fs.cats).sort(function(a,b){return b[1]-a[1];}).slice(0,5).map(function(e){return'  '+e[0]+': USD '+e[1].toFixed(2);}).join('\n');

}

/* ═══════════════════════════════════════
   ASYNC INIT
═══════════════════════════════════════ */
async function init(){
  if(!initSupabase())return;
  // Check for auth callback (password reset redirect)
  var hash=window.location.hash;
  if(hash&&hash.includes('type=recovery')){
    document.getElementById('auth-screen').style.display='flex';
    document.getElementById('auth-content').innerHTML='<h2 class="auth-title">Set New Password</h2>'+
      '<div class="auth-field"><label>New Password</label><input type="password" id="new-pass" placeholder="New password"></div>'+
      '<div class="auth-field"><label>Confirm</label><input type="password" id="new-pass2" placeholder="Repeat password"></div>'+
      '<div id="np-err" class="auth-err"></div>'+
      '<button class="btn bp bfull" onclick="setNewPassword()" style="margin-top:8px">Set New Password</button>';
    return;
  }
  // Listen for auth changes
  sb.auth.onAuthStateChange(async function(event,session){
    if(event==='SIGNED_IN'&&session){CURRENT_USER=session.user;}
    if(event==='SIGNED_OUT'){CURRENT_USER=null;PROFILE=null;}
  });
  // Check existing session
  var res=await sb.auth.getSession();
  if(res.data&&res.data.session){
    CURRENT_USER=res.data.session.user;
    await loadProfile();
    await loadDB();
    initST();
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('app').style.display='flex';
    document.getElementById('app').style.flexDirection='column';
    render();
  } else {
    AUTH_VIEW='login';
    showAuth();
  }
}
async function setNewPassword(){
  var p=document.getElementById('new-pass'),p2=document.getElementById('new-pass2'),err=document.getElementById('np-err');
  if(p.value.length<6){err.textContent='Min 6 characters.';return;}
  if(p.value!==p2.value){err.textContent='Passwords do not match.';return;}
  var r=await sb.auth.updateUser({password:p.value});
  if(r.error){err.textContent=r.error.message;return;}
  err.textContent='';err.style.color='var(--green)';
  toast('Password updated! Redirecting...');
  window.location.hash='';
  setTimeout(function(){init();},1500);
}
if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('./sw.js').catch(function(){});});}
init();
